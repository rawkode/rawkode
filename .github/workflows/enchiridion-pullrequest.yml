# Generated by cuenv - do not edit manually
# Regenerate with: cuenv sync ci

name: enchiridion-pullRequest
on:
  pull_request:
    paths:
    - .github/workflows/enchiridion-pullrequest.yml
    - apps/enchiridion/astro.config.mjs
    - apps/enchiridion/astro.config.mjs/**
    - apps/enchiridion/env.cue
    - apps/enchiridion/env.cue/**
    - apps/enchiridion/flue.config.ts
    - apps/enchiridion/flue.config.ts/**
    - apps/enchiridion/migrations/**/*
    - apps/enchiridion/package-lock.json
    - apps/enchiridion/package-lock.json/**
    - apps/enchiridion/package.json
    - apps/enchiridion/package.json/**
    - apps/enchiridion/public/**/*
    - apps/enchiridion/schema/**
    - apps/enchiridion/scripts/**/*
    - apps/enchiridion/src/**/*
    - apps/enchiridion/tests/**/*
    - apps/enchiridion/tsconfig.json
    - apps/enchiridion/tsconfig.json/**
    - apps/enchiridion/wrangler.jsonc
    - apps/enchiridion/wrangler.jsonc/**
    - cue.mod/**
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
jobs:
  enchiridion-pullRequest:
    name: enchiridion-pullRequest
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Setup cuenv
      run: |-
        arch="$(uname -m)"
        case "$arch" in
          x86_64|amd64) cuenv_asset="cuenv-linux-x64" ;;
          aarch64|arm64) cuenv_asset="cuenv-linux-arm64" ;;
          *) echo "Unsupported Linux architecture: $arch" >&2; exit 1 ;;
        esac
        cuenv_version="0.53.2"
        if [ "$cuenv_version" = "latest" ]; then
          cuenv_url="https://github.com/cuenv/cuenv/releases/latest/download/${cuenv_asset}"
        else
          cuenv_url="https://github.com/cuenv/cuenv/releases/download/${cuenv_version}/${cuenv_asset}"
        fi
        curl -sSL -o /usr/local/bin/cuenv "$cuenv_url" && chmod +x /usr/local/bin/cuenv && /usr/local/bin/cuenv sync ci
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup 1Password
      run: cuenv exec -- cuenv secrets setup onepassword
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    - name: 'Run pipeline: pullRequest'
      run: cuenv ci --pipeline pullRequest --path apps/enchiridion
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_REF_TYPE: ${{ github.ref_type }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        CUENV_ENVIRONMENT: production
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
