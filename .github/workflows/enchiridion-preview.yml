name: Enchiridion Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/enchiridion/**"
      - ".github/workflows/enchiridion-preview.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: enchiridion-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build and publish preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/enchiridion
    env:
      CUENV_ENVIRONMENT: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup cuenv
        run: |-
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) cuenv_asset="cuenv-linux-x64" ;;
            aarch64|arm64) cuenv_asset="cuenv-linux-arm64" ;;
            *) echo "Unsupported Linux architecture: $arch" >&2; exit 1 ;;
          esac
          cuenv_version="0.53.2"
          if [ "$cuenv_version" = "latest" ]; then
            cuenv_url="https://github.com/cuenv/cuenv/releases/latest/download/${cuenv_asset}"
          else
            cuenv_url="https://github.com/cuenv/cuenv/releases/download/${cuenv_version}/${cuenv_asset}"
          fi
          curl -sSL -o /usr/local/bin/cuenv "$cuenv_url" && chmod +x /usr/local/bin/cuenv && /usr/local/bin/cuenv sync ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup 1Password
        run: cuenv exec -- cuenv secrets setup onepassword
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/enchiridion/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload Cloudflare preview version
        id: preview
        shell: bash
        run: |
          set -euo pipefail

          preview_alias="pr-${{ github.event.pull_request.number }}"
          deploy_output="$(cuenv exec -e production npm run preview:upload -- --preview-alias "$preview_alias" --tag "$preview_alias" --message "PR #${{ github.event.pull_request.number }} ${GITHUB_SHA}" 2>&1)"

          printf '%s\n' "$deploy_output"
          preview_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]\")]+workers.dev[^[:space:]\")]*' | tail -n 1)"

          if [ -z "$preview_url" ]; then
            echo "Wrangler did not print a workers.dev preview URL." >&2
            exit 1
          fi

          echo "url=$preview_url" >> "$GITHUB_OUTPUT"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- enchiridion-preview -->';
            const previewUrl = '${{ steps.preview.outputs.url }}';
            const body = [
              marker,
              `Enchiridion preview: ${previewUrl}`,
              '',
              `Built from \`${context.sha.slice(0, 12)}\`.`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => {
              return comment.user.type === 'Bot' && comment.body.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
