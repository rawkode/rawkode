name: Notes
options:
  bundleIdPrefix: com.rawkode
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 6.0
targets:
  Notes-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Shared
        excludes:
          - Resources/**
      - path: Sources/Shared/Resources/Editor
        type: folder
        buildPhase: resources
      - path: Sources/iOS
    dependencies:
      - sdk: libsqlite3.tbd
      - sdk: WebKit.framework
    preBuildScripts:
      - name: Build Web Editor
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          BUN="${HOME}/.bun/bin/bun"
          if [ ! -x "${BUN}" ]; then
            BUN="bun"
          fi

          cd "${SRCROOT}/WebEditor"
          "${BUN}" install --frozen-lockfile
          "${BUN}" run build
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Notes
        PRODUCT_BUNDLE_IDENTIFIER: com.rawkode.notes
        PRODUCT_NAME: Notes
  Notes-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Shared
        excludes:
          - Resources/**
      - path: Sources/Shared/Resources/Editor
        type: folder
        buildPhase: resources
      - path: Sources/macOS
    dependencies:
      - sdk: libsqlite3.tbd
      - sdk: WebKit.framework
    preBuildScripts:
      - name: Build Web Editor
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          BUN="${HOME}/.bun/bin/bun"
          if [ ! -x "${BUN}" ]; then
            BUN="bun"
          fi

          cd "${SRCROOT}/WebEditor"
          "${BUN}" install --frozen-lockfile
          "${BUN}" run build
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Notes
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        PRODUCT_BUNDLE_IDENTIFIER: com.rawkode.notes
        PRODUCT_NAME: Notes
  NotesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NotesTests
    dependencies:
      - target: Notes-macOS
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Notes.app/Contents/MacOS/Notes"
schemes:
  Notes iOS:
    build:
      targets:
        Notes-iOS: all
    run:
      config: Debug
  Notes macOS:
    build:
      targets:
        Notes-macOS: all
        NotesTests: [test]
    run:
      config: Debug
    test:
      targets:
        - NotesTests
